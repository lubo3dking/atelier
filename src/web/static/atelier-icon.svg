<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Atelier app icon">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0f8"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#5b62a8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- light app tile -->
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="3" y="3" width="506" height="506" rx="114" fill="none" stroke="#e3e6f1" stroke-width="2"/>

  <!-- technical flat sketch of a garment (tee), indigo line art -->
  <g filter="url(#soft)" fill="none" stroke="#6366f1" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <path d="M196 150
             L150 176 L122 232 L160 256 L176 230
             L176 360 Q176 372 188 372 L324 372 Q336 372 336 360
             L336 230 L352 256 L390 232 L362 176 L316 150
             Q256 188 196 150 Z"/>
    <!-- collar -->
    <path d="M196 150 Q256 196 316 150"/>
  </g>

  <!-- measurement tick accent (coral) -->
  <g stroke="#ff6b5e" stroke-width="9" stroke-linecap="round">
    <line x1="206" y1="406" x2="306" y2="406"/>
    <line x1="206" y1="398" x2="206" y2="414"/>
    <line x1="306" y1="398" x2="306" y2="414"/>
    <line x1="256" y1="400" x2="256" y2="412"/>
  </g>
  <!-- needle dot -->
  <circle cx="256" cy="120" r="9" fill="#ff6b5e"/>
</svg>
